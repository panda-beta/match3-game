<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星座连连看</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .score-item .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .score-item .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 20px;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(147, 112, 219, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(173, 216, 230, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(100, 149, 237, 0.12) 0%, transparent 70%),
                linear-gradient(135deg, #1e1e3f 0%, #2a2a5a 25%, #35356a 50%, #2a2a5a 75%, #1e1e3f 100%);
            border-radius: 10px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            min-height: 440px;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.25);
        }

        /* 星星呼吸闪烁 - 高级克制 */
        @keyframes twinkle {
            0% {
                opacity: 0.25;
                transform: scale(0.9);
            }
            25% {
                opacity: 0.6;
                transform: scale(0.97);
            }
            50% {
                opacity: 0.95;
                transform: scale(1);
            }
            75% {
                opacity: 0.5;
                transform: scale(0.97);
            }
            100% {
                opacity: 0.25;
                transform: scale(0.9);
            }
        }

        /* 星星轻微漂浮 */
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-2px);
            }
        }

        /* 星星 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 5s ease-in-out infinite, float 6s ease-in-out infinite;
        }

        .star::before {
            content: '';
            position: absolute;
            width: 500%;
            height: 500%;
            left: -200%;
            top: -200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 40%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 十字星光 - 唯美克制 */
        .star.bright::after {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            left: -100%;
            top: -100%;
            background:
                linear-gradient(to right, transparent 43%, rgba(255, 255, 255, 0.35) 50%, transparent 57%),
                linear-gradient(to bottom, transparent 43%, rgba(255, 255, 255, 0.35) 50%, transparent 57%);
            transform: rotate(45deg);
        }

        .cell {
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: #fff;
            transition: all 0.2s ease;
            z-index: 1;
        }

        .cell.empty {
            visibility: hidden;
        }

        .cell.selected {
            transform: scale(1.2);
            font-weight: bold;
        }

        .cell.matched {
            animation: match 0.3s ease-out;
        }

        @keyframes match {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .level-complete {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }

        .level-complete.show {
            display: flex;
        }

        .level-complete-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .level-complete h2 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .level-complete p {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🌟 星座连连看</h1>
        </div>
        
        <div class="score-board">
            <div class="score-item">
                <div class="label">当前关卡</div>
                <div class="value" id="level">1</div>
            </div>
            <div class="score-item">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="label">剩余方块</div>
                <div class="value" id="remaining">0</div>
            </div>
        </div>

        <div class="game-board" id="board"></div>

        <div class="buttons">
            <button class="btn" onclick="game.restart()">🔄 重新开始</button>
            <button class="btn" onclick="game.hint()">💡 提示</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <div class="level-complete" id="levelComplete">
        <div class="level-complete-content">
            <h2>🎉 关卡完成！</h2>
            <p id="levelMessage">恭喜您完成了本关！</p>
            <button class="btn" onclick="game.nextLevel()">下一关</button>
        </div>
    </div>

    <script src="game.js?v=14"></script>
</body>
</html>
